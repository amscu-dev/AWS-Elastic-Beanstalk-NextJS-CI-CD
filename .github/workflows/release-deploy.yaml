name: Release Deploy

run-name: "Release Deploy ${{ github.ref_name }}"

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}
jobs:
  run-tests:
    uses: ./.github/workflows/test-build.yaml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      FLAGSMITH_KEY: ${{ secrets.FLAGSMITH_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-to-staging:
    needs: run-tests
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    permissions:
      pull-requests: write
      id-token: write
    with:
      aws-env: ${{ vars.AWS_EB_STAGING_ENV }}
      github-env: "staging"

  run-e2e-tests:
    needs: deploy-to-staging
    uses: ./.github/workflows/e2e-tests.yaml
    with:
      base-url: ${{ needs.deploy-to-staging.outputs.aws-url }}

  deploy-to-production:
    needs: run-e2e-tests
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    permissions:
      pull-requests: write
      id-token: write
    with:
      aws-env: ${{ vars.AWS_EB_PRODUCTION_ENV }}
      github-env: "production"
